<!DOCTYPE html>
<html>
  <head>
    <title>UNO</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div id="lobby">
      <h2>UNO ロビー</h2>
      <p>現在の人数: <span id="player-count">0</span> / 4 人</p>
      <p id="error-message" style="color: #ffaaaaaa;"></p>
      <button id="start-btn" disabled style="padding: 10px 20px; font-size: 18px;">ゲーム開始</button>
    </div>

    <div id="game-board">
      
      <div id="field">
        <h2>現在の場のカード</h2>
        <div id="discard-pile"></div>
      </div>

      <h2>あなたの手札</h2>
      <div id="my-hand"></div>
      
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/main.js"></script>
  </body>
</html>
